<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Fish Tank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        #fishTank {
            width: 100%;
            height: 100%;
            display: block;
            background: linear-gradient(180deg, #1a4d7a 0%, #0d2e47 50%, #061a2c 100%);
        }

        /* Light filtering animation */
        @keyframes lightFilter {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <canvas id="fishTank"></canvas>

    <script>
        const canvas = document.getElementById('fishTank');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Fish species with different characteristics
        const fishSpecies = [
            {
                name: 'Clownfish',
                color: '#ff6b35',
                stripes: ['#ffffff', '#000000'],
                length: 40,
                speed: 1.5,
                depth: 0.3
            },
            {
                name: 'Tang',
                color: '#ffd700',
                stripes: null,
                length: 50,
                speed: 2,
                depth: 0.5
            },
            {
                name: 'Angelfish',
                color: '#4169e1',
                stripes: ['#ffffff'],
                length: 45,
                speed: 1.2,
                depth: 0.4
            },
            {
                name: 'Pufferfish',
                color: '#90ee90',
                stripes: ['#000000'],
                length: 35,
                speed: 0.8,
                depth: 0.6
            },
            {
                name: 'Goby',
                color: '#8b4513',
                stripes: ['#d2691e'],
                length: 30,
                speed: 1.8,
                depth: 0.8
            },
            {
                name: 'Parrotfish',
                color: '#ff1493',
                stripes: ['#ffb6c1'],
                length: 55,
                speed: 1.3,
                depth: 0.35
            },
            {
                name: 'Blenny',
                color: '#2f4f4f',
                stripes: ['#708090'],
                length: 25,
                speed: 2.2,
                depth: 0.85
            },
            {
                name: 'Wrasse',
                color: '#00ced1',
                stripes: ['#20b2aa'],
                length: 42,
                speed: 1.6,
                depth: 0.45
            }
        ];

        // Create fish objects
        const fish = [];
        for (let i = 0; i < fishSpecies.length; i++) {
            const species = fishSpecies[i];
            fish.push({
                x: Math.random() * canvas.width,
                y: canvas.height * (0.2 + species.depth * 0.5),
                vx: (Math.random() > 0.5 ? 1 : -1) * species.speed,
                vy: (Math.random() - 0.5) * 0.3,
                species: species,
                angle: 0,
                turnRate: (Math.random() - 0.5) * 0.05,
                wobbleOffset: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.02 + Math.random() * 0.03
            });
        }

        // Bubbles
        const bubbles = [];
        function createBubble() {
            const bubble = {
                x: canvas.width * 0.15 + Math.random() * 0.05 * canvas.width,
                y: canvas.height + 10,
                vy: -0.5 - Math.random() * 0.3,
                radius: 2 + Math.random() * 3,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.02 + Math.random() * 0.03
            };
            bubbles.push(bubble);
            return bubble;
        }

        // Initial bubbles
        for (let i = 0; i < 8; i++) {
            setTimeout(() => createBubble(), i * 500);
        }

        // Plants
        const plants = [];
        for (let i = 0; i < 4; i++) {
            plants.push({
                x: (i + 1) * (canvas.width / 5),
                baseHeight: canvas.height * 0.7,
                segments: 6,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.01 + Math.random() * 0.01
            });
        }

        // Pebbles on the bottom
        const pebbles = [];
        for (let i = 0; i < 15; i++) {
            pebbles.push({
                x: Math.random() * canvas.width,
                y: canvas.height - 20 - Math.random() * 10,
                radius: 5 + Math.random() * 8,
                color: ['#8b7355', '#a0826d', '#7a6b5d', '#9b8b7e'][Math.floor(Math.random() * 4)]
            });
        }

        // Caustic light patterns
        const causticsTime = { value: 0 };

        // Draw functions
        function drawFish(fish, ctx) {
            ctx.save();
            ctx.translate(fish.x, fish.y);
            
            // Flip fish if moving left
            if (fish.vx < 0) {
                ctx.scale(-1, 1);
            }

            const species = fish.species;
            const len = species.length;

            // Body
            ctx.fillStyle = species.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, len * 0.5, len * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();

            // Stripes
            if (species.stripes) {
                for (let i = 0; i < species.stripes.length; i++) {
                    ctx.fillStyle = species.stripes[i];
                    ctx.beginPath();
                    ctx.ellipse(0, -len * 0.15 + i * len * 0.1, len * 0.4, len * 0.08, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Eye
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(len * 0.2, -len * 0.15, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(len * 0.22, -len * 0.15, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // Tail
            ctx.fillStyle = species.color;
            ctx.beginPath();
            ctx.moveTo(-len * 0.3, 0);
            ctx.lineTo(-len * 0.6, -len * 0.2);
            ctx.lineTo(-len * 0.5, 0);
            ctx.lineTo(-len * 0.6, len * 0.2);
            ctx.closePath();
            ctx.fill();

            // Dorsal fin
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.moveTo(-len * 0.1, -len * 0.2);
            ctx.lineTo(0, -len * 0.35);
            ctx.lineTo(len * 0.1, -len * 0.2);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawPlant(plant, ctx, wobble) {
            const segments = plant.segments;
            const segmentLength = plant.baseHeight / segments;
            
            ctx.strokeStyle = 'rgba(34, 139, 34, 0.6)';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(plant.x, canvas.height);

            for (let i = 0; i < segments; i++) {
                const waveOffset = Math.sin(wobble + i * 0.5) * 15;
                const x = plant.x + waveOffset;
                const y = canvas.height - (i + 1) * segmentLength;
                ctx.lineTo(x, y);
            }

            ctx.stroke();
        }

        function drawBubble(bubble, ctx) {
            const gradient = ctx.createRadialGradient(
                bubble.x - 2, bubble.y - 2, 0,
                bubble.x, bubble.y, bubble.radius
            );
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
            gradient.addColorStop(0.7, 'rgba(100, 200, 255, 0.1)');
            gradient.addColorStop(1, 'rgba(50, 150, 200, 0.05)');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(bubble.x, bubble.y, bubble.radius, 0, Math.PI * 2);
            ctx.fill();

            // Bubble highlight
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(bubble.x - 1, bubble.y - 1, bubble.radius * 0.5, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawPebble(pebble, ctx) {
            ctx.fillStyle = pebble.color;
            ctx.beginPath();
            ctx.ellipse(pebble.x, pebble.y, pebble.radius, pebble.radius * 0.6, Math.random() * 0.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawCaustics(ctx, time) {
            // Create caustic light patterns
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            
            // Subtle wave pattern overlay
            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
            
            for (let x = 0; x < canvas.width; x += 60) {
                const waveY = Math.sin(x * 0.01 + time * 0.02) * 30;
                for (let y = 0; y < canvas.height; y += 60) {
                    const distance = Math.sqrt((x - canvas.width / 2) ** 2 + (y - canvas.height / 2) ** 2);
                    const wave = Math.sin(distance * 0.01 + time * 0.03) * 0.5 + 0.5;
                    
                    ctx.fillStyle = `rgba(255, 255, 255, ${wave * 0.03})`;
                    ctx.fillRect(x, y + waveY, 60, 60);
                }
            }
        }

        // Update function
        function update() {
            const now = Date.now() * 0.001;

            // Update fish
            for (let f of fish) {
                // Natural wobbling movement
                f.wobbleOffset += f.wobbleSpeed;
                const wobbleY = Math.sin(f.wobbleOffset) * 0.5;
                
                // Update position
                f.x += f.vx;
                f.y += f.vy + wobbleY;

                // Turning behavior
                f.turnRate = (Math.random() - 0.5) * 0.02;
                f.vx += f.turnRate;

                // Boundary wrapping
                if (f.x > canvas.width + 50) f.x = -50;
                if (f.x < -50) f.x = canvas.width + 50;

                // Keep fish within reasonable vertical bounds
                const minY = canvas.height * 0.15;
                const maxY = canvas.height * 0.85;
                if (f.y < minY) {
                    f.y = minY;
                    f.vy = Math.abs(f.vy);
                }
                if (f.y > maxY) {
                    f.y = maxY;
                    f.vy = -Math.abs(f.vy);
                }

                // Occasionally change direction
                if (Math.random() < 0.002) {
                    f.vy = (Math.random() - 0.5) * 0.8;
                }
            }

            // Update bubbles
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                bubble.wobble += bubble.wobbleSpeed;
                bubble.x += Math.sin(bubble.wobble) * 0.2;
                bubble.y += bubble.vy;

                if (bubble.y < -10) {
                    bubbles.splice(i, 1);
                }
            }

            // Create new bubbles occasionally
            if (Math.random() < 0.05) {
                createBubble();
            }

            // Update plants
            for (let plant of plants) {
                plant.wobble += plant.wobbleSpeed;
            }

            causticsTime.value = now;
        }

        // Render function
        function render() {
            // Clear canvas with water gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a7fa0');
            gradient.addColorStop(0.3, '#1a6b8f');
            gradient.addColorStop(0.7, '#0d4a6d');
            gradient.addColorStop(1, '#052a3d');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw caustics
            drawCaustics(ctx, causticsTime.value);

            // Draw plants
            for (let plant of plants) {
                drawPlant(plant, ctx, plant.wobble);
            }

            // Draw pebbles
            for (let pebble of pebbles) {
                drawPebble(pebble, ctx);
            }

            // Draw fish
            for (let f of fish) {
                drawFish(f, ctx);
            }

            // Draw bubbles
            for (let bubble of bubbles) {
                drawBubble(bubble, ctx);
            }

            // Light filtering effect from above
            const lightGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            lightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.08)');
            lightGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0)');
            lightGradient.addColorStop(1, 'rgba(0, 0, 0, 0.2)');
            ctx.fillStyle = lightGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Animation loop
        function animate() {
            update();
            render();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
