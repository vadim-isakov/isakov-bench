<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Air Balloon Over Mountains</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

let W, H, time = 0;
let balloonBaseY;

function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  balloonBaseY = H * 0.30;
}
window.addEventListener('resize', resize);
resize();

// ─── Sky ───
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0f0a2e');
  grad.addColorStop(0.12, '#1a1050');
  grad.addColorStop(0.25, '#3b1f7a');
  grad.addColorStop(0.38, '#7b2d8e');
  grad.addColorStop(0.48, '#c44e6c');
  grad.addColorStop(0.56, '#e8734a');
  grad.addColorStop(0.64, '#f49c3e');
  grad.addColorStop(0.73, '#f7c948');
  grad.addColorStop(0.82, '#fce588');
  grad.addColorStop(0.92, '#fef3c7');
  grad.addColorStop(1.0, '#fdf6e3');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ─── Sun ───
function drawSun() {
  const sunX = W * 0.7;
  const sunY = H * 0.62;
  const r = Math.min(W, H) * 0.07;

  for (let i = 6; i >= 0; i--) {
    const gr = r + i * r * 0.7;
    const grad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, gr);
    const alpha = 0.07 - i * 0.009;
    grad.addColorStop(0, `rgba(255,230,120,${Math.max(alpha, 0.005)})`);
    grad.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sunX, sunY, gr, 0, Math.PI * 2);
    ctx.fill();
  }

  const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, r);
  sg.addColorStop(0, '#fffff0');
  sg.addColorStop(0.4, '#fff9c4');
  sg.addColorStop(1, '#ffcc02');
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.arc(sunX, sunY, r, 0, Math.PI * 2);
  ctx.fill();
}

// ─── Stars ───
const stars = Array.from({length: 100}, () => ({
  x: Math.random(), y: Math.random() * 0.28,
  r: Math.random() * 1.5 + 0.5,
  speed: Math.random() * 2 + 1,
  phase: Math.random() * Math.PI * 2
}));

function drawStars() {
  stars.forEach(s => {
    const alpha = 0.25 + 0.35 * Math.sin(time * s.speed + s.phase);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r * devicePixelRatio, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ─── Clouds ───
class Cloud {
  constructor(startInView) {
    this.init(startInView);
  }
  init(startInView) {
    this.scale = (Math.random() * 0.5 + 0.6) * devicePixelRatio;
    this.w = (100 + Math.random() * 140) * this.scale;
    this.h = (30 + Math.random() * 20) * this.scale;
    this.y = Math.random() * H * 0.50 + H * 0.05;
    this.speed = (Math.random() * 0.25 + 0.1) * devicePixelRatio;
    this.alpha = Math.random() * 0.25 + 0.12;
    this.puffs = Array.from({length: Math.floor(Math.random()*5)+3}, () => ({
      ox: (Math.random() - 0.5) * 0.8,
      oy: (Math.random() - 0.6) * 0.5,
      r: Math.random() * 0.28 + 0.22
    }));
    this.x = startInView ? Math.random() * (W + this.w) - this.w * 0.5 : -this.w - Math.random() * 200;
  }
  update() {
    this.x += this.speed;
    if (this.x > W + this.w + 50) this.init(false);
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    this.puffs.forEach(p => {
      const px = this.x + p.ox * this.w + this.w * 0.5;
      const py = this.y + p.oy * this.h;
      const pr = p.r * this.h;
      const g = ctx.createRadialGradient(px, py, 0, px, py, pr * 2);
      g.addColorStop(0, 'rgba(255,255,255,0.9)');
      g.addColorStop(0.6, 'rgba(255,245,230,0.4)');
      g.addColorStop(1, 'rgba(255,240,220,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(px, py, pr * 2.2, pr * 1.2, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.restore();
  }
}

const clouds = Array.from({length: 14}, () => new Cloud(true));

// ─── Mountains ───
function mountainNoise(x, freq, seed) {
  return (
    0.5 * Math.sin(x * freq * 0.002 + seed) +
    0.3 * Math.sin(x * freq * 0.005 + seed * 2.7) +
    0.15 * Math.sin(x * freq * 0.012 + seed * 5.3) +
    0.05 * Math.sin(x * freq * 0.025 + seed * 9.1)
  );
}

function drawMountainRange(baseY, color, amplitude, freq, seed) {
  ctx.beginPath();
  ctx.moveTo(-5, H + 5);
  for (let x = -5; x <= W + 5; x += 3) {
    const n = mountainNoise(x, freq, seed);
    const y = baseY - amplitude * (0.5 + 0.5 * n);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W + 5, H + 5);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawMountains() {
  const b = H * 0.68;
  // Distant (lightest)
  drawMountainRange(b - H*0.04, '#8b7daa', H*0.17, 1.0, 1.2);
  drawMountainRange(b,           '#746690', H*0.15, 1.1, 3.4);
  // Mid
  drawMountainRange(b + H*0.06, '#5a4e75', H*0.13, 1.3, 5.6);
  drawMountainRange(b + H*0.10, '#453b60', H*0.11, 1.5, 7.8);
  // Near (darkest)
  drawMountainRange(b + H*0.15, '#312848', H*0.09, 1.8, 10.0);
  drawMountainRange(b + H*0.19, '#241d38', H*0.07, 2.2, 12.5);
  // Foreground fill
  ctx.fillStyle = '#170f28';
  ctx.fillRect(0, b + H*0.24, W, H);
}

// ─── Birds ───
class Bird {
  constructor(startInView) {
    this.init(startInView);
  }
  init(startInView) {
    this.y = Math.random() * H * 0.38 + H * 0.06;
    this.speed = (Math.random() * 0.8 + 0.4) * devicePixelRatio;
    this.wingPhase = Math.random() * Math.PI * 2;
    this.wingSpeed = Math.random() * 3 + 4;
    this.size = (Math.random() * 2.5 + 1.5) * devicePixelRatio;
    this.x = startInView ? Math.random() * W : -30 - Math.random() * 100;
  }
  update(dt) {
    this.x += this.speed;
    this.wingPhase += this.wingSpeed * dt;
    this.y += Math.sin(time * 0.5 + this.wingPhase) * 0.15;
    if (this.x > W + 60) this.init(false);
  }
  draw() {
    const wy = Math.sin(this.wingPhase) * this.size;
    ctx.strokeStyle = 'rgba(25,15,35,0.55)';
    ctx.lineWidth = Math.max(1, 1.2 * devicePixelRatio);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(this.x - this.size * 2.2, this.y + wy);
    ctx.quadraticCurveTo(this.x - this.size * 0.5, this.y - wy * 0.4, this.x, this.y);
    ctx.quadraticCurveTo(this.x + this.size * 0.5, this.y - wy * 0.4, this.x + this.size * 2.2, this.y + wy);
    ctx.stroke();
  }
}

const birds = Array.from({length: 10}, () => new Bird(true));

// ─── Balloon ───
const BALLOON_COLORS = [
  '#d62839', '#ef6c35', '#f4a833', '#f7d04b', '#7bc67e',
  '#3ba3a8', '#4a72b0', '#d62839', '#f4a833', '#7bc67e'
];

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

let flameIntensity = 0;
let flameTimer = 0;
let flameBurst = false;

function drawFlame(cx, cy, size) {
  if (flameIntensity <= 0.01) return;
  ctx.save();
  ctx.globalAlpha = flameIntensity;

  const flick = Math.sin(time * 18) * size * 0.12 + Math.cos(time * 25) * size * 0.08;
  const h = size * (1.5 + flameIntensity * 0.8);

  const grad = ctx.createLinearGradient(cx, cy, cx, cy - h);
  grad.addColorStop(0, 'rgba(255,255,220,0.95)');
  grad.addColorStop(0.25, 'rgba(255,200,60,0.85)');
  grad.addColorStop(0.6, 'rgba(255,100,20,0.5)');
  grad.addColorStop(1, 'rgba(255,40,0,0)');

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(cx - size * 0.25, cy);
  ctx.quadraticCurveTo(cx - size * 0.18 + flick * 0.3, cy - h * 0.6, cx + flick * 0.5, cy - h);
  ctx.quadraticCurveTo(cx + size * 0.18 - flick * 0.3, cy - h * 0.6, cx + size * 0.25, cy);
  ctx.closePath();
  ctx.fill();

  // Ambient glow on envelope interior
  const glowG = ctx.createRadialGradient(cx, cy - h * 0.3, 0, cx, cy - h, size * 4);
  glowG.addColorStop(0, `rgba(255,160,40,${0.12 * flameIntensity})`);
  glowG.addColorStop(1, 'rgba(255,100,20,0)');
  ctx.fillStyle = glowG;
  ctx.fillRect(cx - size * 4, cy - size * 5, size * 8, size * 5);

  ctx.restore();
}

function drawEnvelope(cx, cy, envW, envH) {
  const strips = BALLOON_COLORS.length;
  const stripW = envW / strips;

  // Clip to envelope shape
  ctx.save();

  // Build envelope path
  function envelopePath() {
    ctx.beginPath();
    ctx.moveTo(cx, cy - envH * 0.95);
    ctx.bezierCurveTo(cx + envW * 0.7, cy - envH * 0.92, cx + envW * 0.55, cy - envH * 0.3, cx + envW * 0.15, cy + envH * 0.15);
    ctx.quadraticCurveTo(cx + envW * 0.06, cy + envH * 0.38, cx, cy + envH * 0.42);
    ctx.quadraticCurveTo(cx - envW * 0.06, cy + envH * 0.38, cx - envW * 0.15, cy + envH * 0.15);
    ctx.bezierCurveTo(cx - envW * 0.55, cy - envH * 0.3, cx - envW * 0.7, cy - envH * 0.92, cx, cy - envH * 0.95);
    ctx.closePath();
  }

  // Draw strips with clip
  for (let i = 0; i < strips; i++) {
    const sx = cx - envW * 0.55 + (envW * 1.1 / strips) * i;
    const sw = envW * 1.1 / strips + 1;

    ctx.save();
    envelopePath();
    ctx.clip();

    // Per-strip gradient for 3D look
    const base = BALLOON_COLORS[i];
    const g = ctx.createLinearGradient(cx - envW * 0.5, cy, cx + envW * 0.5, cy);
    g.addColorStop(0, darken(base, 45));
    g.addColorStop(0.35, lighten(base, 30));
    g.addColorStop(0.55, base);
    g.addColorStop(1, darken(base, 55));
    ctx.fillStyle = g;
    ctx.fillRect(sx, cy - envH, sw, envH * 2);

    ctx.restore();
  }

  // Vertical seam lines
  ctx.save();
  envelopePath();
  ctx.clip();
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;
  for (let i = 1; i < strips; i++) {
    const lx = cx - envW * 0.55 + (envW * 1.1 / strips) * i;
    ctx.beginPath();
    ctx.moveTo(lx, cy - envH);
    ctx.lineTo(lx, cy + envH * 0.5);
    ctx.stroke();
  }
  // Horizontal band
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = envW * 0.04;
  ctx.beginPath();
  ctx.moveTo(cx - envW * 0.55, cy - envH * 0.25);
  ctx.lineTo(cx + envW * 0.55, cy - envH * 0.25);
  ctx.stroke();
  ctx.restore();

  // Outline
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1.5;
  envelopePath();
  ctx.stroke();

  // Specular highlight
  const hlG = ctx.createRadialGradient(cx - envW * 0.18, cy - envH * 0.45, 0, cx - envW * 0.1, cy - envH * 0.25, envW * 0.55);
  hlG.addColorStop(0, 'rgba(255,255,255,0.28)');
  hlG.addColorStop(0.6, 'rgba(255,255,255,0.05)');
  hlG.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlG;
  envelopePath();
  ctx.fill();

  ctx.restore();
}

function drawBalloon(cx, cy) {
  const envW = Math.min(W, H) * 0.10;
  const envH = envW * 1.5;
  const basketW = envW * 0.32;
  const basketH = envW * 0.2;
  const ropeLen = envH * 0.32;

  const envCenterY = cy - envH * 0.28;
  const envBottom = envCenterY + envH * 0.42;
  const basketTop = envBottom + ropeLen;

  // Flame (drawn inside envelope area)
  const flameSize = envW * 0.3;
  drawFlame(cx, envBottom - envH * 0.05, flameSize);

  // Envelope
  drawEnvelope(cx, envCenterY, envW, envH);

  // Throat ring
  ctx.fillStyle = '#5a4030';
  ctx.beginPath();
  ctx.ellipse(cx, envBottom, envW * 0.14, envW * 0.045, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#3e2a1a';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Ropes
  ctx.strokeStyle = 'rgba(120,90,50,0.8)';
  ctx.lineWidth = Math.max(1, 1.2 * devicePixelRatio);
  const inset = envW * 0.10;
  const pts = [
    [cx - inset, envBottom, cx - basketW * 0.48, basketTop],
    [cx + inset, envBottom, cx + basketW * 0.48, basketTop],
    [cx - inset * 0.4, envBottom, cx - basketW * 0.15, basketTop],
    [cx + inset * 0.4, envBottom, cx + basketW * 0.15, basketTop],
  ];
  pts.forEach(([x1,y1,x2,y2]) => {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  });

  // Basket
  const bg = ctx.createLinearGradient(cx - basketW/2, basketTop, cx + basketW/2, basketTop + basketH);
  bg.addColorStop(0, '#a07828');
  bg.addColorStop(0.5, '#8b6914');
  bg.addColorStop(1, '#6b4e12');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.moveTo(cx - basketW/2, basketTop);
  ctx.lineTo(cx - basketW * 0.43, basketTop + basketH);
  ctx.lineTo(cx + basketW * 0.43, basketTop + basketH);
  ctx.lineTo(cx + basketW/2, basketTop);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#4a3510';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Rim
  ctx.fillStyle = '#b8902e';
  const rimH = 4 * devicePixelRatio;
  ctx.fillRect(cx - basketW/2 - 1, basketTop - rimH, basketW + 2, rimH);

  // Weave
  ctx.strokeStyle = 'rgba(70,50,20,0.35)';
  ctx.lineWidth = 0.8;
  for (let i = 1; i < 3; i++) {
    const yy = basketTop + (basketH / 3) * i;
    ctx.beginPath();
    const t = i / 3;
    const xL = cx - (basketW/2 * (1-t) + basketW*0.43 * t);
    const xR = cx + (basketW/2 * (1-t) + basketW*0.43 * t);
    ctx.moveTo(xL + 2, yy);
    ctx.lineTo(xR - 2, yy);
    ctx.stroke();
  }
}

// ─── Atmospheric haze ───
function drawHaze() {
  const hg = ctx.createLinearGradient(0, H*0.55, 0, H*0.78);
  hg.addColorStop(0, 'rgba(230,170,110,0)');
  hg.addColorStop(0.5, 'rgba(230,170,110,0.06)');
  hg.addColorStop(1, 'rgba(220,160,100,0.12)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, H*0.55, W, H*0.25);
}

// ─── Light rays from sun ───
function drawLightRays() {
  const sunX = W * 0.7;
  const sunY = H * 0.62;
  ctx.save();
  ctx.globalAlpha = 0.03 + Math.sin(time * 0.3) * 0.01;
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 + time * 0.02;
    const len = Math.min(W, H) * 0.5;
    const spread = 0.06;
    ctx.fillStyle = 'rgba(255,220,120,0.15)';
    ctx.beginPath();
    ctx.moveTo(sunX, sunY);
    ctx.lineTo(sunX + Math.cos(angle - spread) * len, sunY + Math.sin(angle - spread) * len);
    ctx.lineTo(sunX + Math.cos(angle + spread) * len, sunY + Math.sin(angle + spread) * len);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// ─── Main Loop ───
let lastTime = 0;

function animate(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  time += dt;

  // Balloon position: drifts horizontally and bobs
  const bx = W * 0.5 + Math.sin(time * 0.08) * W * 0.25 + Math.sin(time * 0.21) * W * 0.03;
  const by = balloonBaseY + Math.sin(time * 0.35) * H * 0.02 + Math.sin(time * 0.14) * H * 0.012;

  // Flame timing
  flameTimer += dt;
  if (flameBurst) {
    flameIntensity = Math.min(1, flameIntensity + dt * 5);
    if (flameTimer > 1.0 + Math.random() * 0.3) {
      flameBurst = false;
      flameTimer = 0;
    }
  } else {
    flameIntensity = Math.max(0, flameIntensity - dt * 3);
    if (flameTimer > 2.0 + Math.random() * 2.0) {
      flameBurst = true;
      flameTimer = 0;
    }
  }

  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawStars();
  drawLightRays();
  drawSun();
  drawHaze();

  clouds.slice(0, 7).forEach(c => { c.update(); c.draw(); });

  drawMountains();

  clouds.slice(7).forEach(c => { c.update(); c.draw(); });

  birds.forEach(b => { b.update(dt); b.draw(); });

  // Balloon with gentle sway rotation
  const sway = Math.sin(time * 0.25) * 0.035 + Math.sin(time * 0.6) * 0.015;
  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(sway);
  ctx.translate(-bx, -by);
  drawBalloon(bx, by);
  ctx.restore();

  // Subtle vignette
  const vig = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.75);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.2)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
