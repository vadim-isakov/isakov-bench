<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Air Balloon</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Sky gradient
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a0533');
  g.addColorStop(0.15, '#4a1942');
  g.addColorStop(0.3, '#c2185b');
  g.addColorStop(0.45, '#ff6f00');
  g.addColorStop(0.6, '#ffb74d');
  g.addColorStop(0.78, '#ffe0b2');
  g.addColorStop(1, '#fff8e1');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// Sun
function drawSun() {
  const sx = W * 0.75, sy = H * 0.52;
  for (let i = 5; i > 0; i--) {
    const r = 30 + i * 18;
    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
    g.addColorStop(0, `rgba(255,235,180,${0.4 / i})`);
    g.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#fff8e1';
  ctx.beginPath();
  ctx.arc(sx, sy, 28, 0, Math.PI * 2);
  ctx.fill();
}

// Stars (visible in upper sky)
const stars = Array.from({length: 80}, () => ({
  x: Math.random(), y: Math.random() * 0.3, s: Math.random() * 1.5 + 0.5, tw: Math.random() * Math.PI * 2
}));

function drawStars() {
  stars.forEach(s => {
    const a = 0.3 + 0.7 * Math.abs(Math.sin(t * 0.8 + s.tw));
    ctx.fillStyle = `rgba(255,255,240,${a * (1 - s.y / 0.3) * 0.6})`;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.s, 0, Math.PI * 2);
    ctx.fill();
  });
}

// Clouds
const clouds = Array.from({length: 12}, () => ({
  x: Math.random() * W * 1.5 - W * 0.25,
  y: H * 0.1 + Math.random() * H * 0.35,
  w: 80 + Math.random() * 160,
  speed: 0.15 + Math.random() * 0.35,
  opacity: 0.15 + Math.random() * 0.3
}));

function drawCloud(cx, cy, w, opacity) {
  ctx.fillStyle = `rgba(255,240,230,${opacity})`;
  const h = w * 0.3;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w * 0.5, h * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx - w * 0.25, cy + h * 0.1, w * 0.3, h * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + w * 0.2, cy + h * 0.05, w * 0.35, h * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx - w * 0.1, cy - h * 0.25, w * 0.25, h * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawClouds() {
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x - c.w > W) c.x = -c.w;
    drawCloud(c.x, c.y, c.w, c.opacity);
  });
}

// Mountains
function drawMountainLayer(baseY, peakH, segments, color, offset) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i <= segments + 2; i++) {
    const x = (i / segments) * W * 1.2 - W * 0.1 + offset;
    const noise = Math.sin(i * 2.3 + 0.5) * peakH * 0.4
                + Math.sin(i * 5.1 + 1.2) * peakH * 0.2
                + Math.sin(i * 0.7 + 3.0) * peakH * 0.3;
    const y = baseY - Math.abs(noise);
    if (i === 0) ctx.lineTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.lineTo(W + 10, H);
  ctx.closePath();
  ctx.fill();
}

function drawMountains() {
  const drift = t * 0.3;
  drawMountainLayer(H * 0.62, H * 0.18, 20, 'rgba(90,60,90,0.5)', Math.sin(drift * 0.02) * 5);
  drawMountainLayer(H * 0.68, H * 0.15, 18, 'rgba(70,40,70,0.6)', Math.sin(drift * 0.03) * 8);
  drawMountainLayer(H * 0.74, H * 0.13, 15, 'rgba(55,30,55,0.7)', Math.sin(drift * 0.04) * 12);
  drawMountainLayer(H * 0.80, H * 0.12, 14, 'rgba(40,22,40,0.8)', Math.sin(drift * 0.05) * 16);
  drawMountainLayer(H * 0.86, H * 0.08, 12, 'rgba(30,15,30,0.9)', Math.sin(drift * 0.06) * 20);

  // Foreground hills
  const g = ctx.createLinearGradient(0, H * 0.85, 0, H);
  g.addColorStop(0, '#1a0f1a');
  g.addColorStop(1, '#0d080d');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 4) {
    const y = H * 0.88 + Math.sin(x * 0.008 + 1) * H * 0.03 + Math.sin(x * 0.003) * H * 0.02;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();
}

// Trees on foreground
function drawTree(tx, ty, size) {
  ctx.fillStyle = '#0d060d';
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx - size * 0.4, ty + size);
  ctx.lineTo(tx + size * 0.4, ty + size);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(tx, ty - size * 0.3);
  ctx.lineTo(tx - size * 0.35, ty + size * 0.6);
  ctx.lineTo(tx + size * 0.35, ty + size * 0.6);
  ctx.closePath();
  ctx.fill();
}

const trees = Array.from({length: 30}, () => {
  const x = Math.random() * W * 1.2 - W * 0.1;
  return { x, y: H * 0.86 + Math.sin(x * 0.008 + 1) * H * 0.03 + Math.sin(x * 0.003) * H * 0.02, s: 10 + Math.random() * 20 };
});

function drawTrees() {
  trees.forEach(tr => drawTree(tr.x, tr.y, tr.s));
}

// Birds
const birds = Array.from({length: 8}, () => ({
  x: Math.random() * W, y: H * 0.15 + Math.random() * H * 0.25,
  speed: 0.4 + Math.random() * 0.6, phase: Math.random() * Math.PI * 2, size: 3 + Math.random() * 4
}));

function drawBird(bx, by, size, wingPhase) {
  const wing = Math.sin(wingPhase) * size * 0.8;
  ctx.strokeStyle = 'rgba(40,20,40,0.5)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(bx - size, by + wing);
  ctx.quadraticCurveTo(bx - size * 0.3, by - Math.abs(wing) * 0.3, bx, by);
  ctx.quadraticCurveTo(bx + size * 0.3, by - Math.abs(wing) * 0.3, bx + size, by + wing);
  ctx.stroke();
}

function drawBirds() {
  birds.forEach(b => {
    b.x += b.speed;
    b.y += Math.sin(t * 0.02 + b.phase) * 0.15;
    if (b.x > W + 20) { b.x = -20; b.y = H * 0.15 + Math.random() * H * 0.25; }
    drawBird(b.x, b.y, b.size, t * 0.08 + b.phase);
  });
}

// Balloon
const balloon = { baseX: W * 0.35, baseY: H * 0.28 };
const stripeColors = ['#e53935','#ff9800','#fdd835','#43a047','#1e88e5','#8e24aa'];

function drawBalloon() {
  const bx = balloon.baseX + Math.sin(t * 0.008) * W * 0.15;
  const by = balloon.baseY + Math.sin(t * 0.012) * H * 0.03 + Math.cos(t * 0.007) * H * 0.015;
  const tilt = Math.sin(t * 0.01) * 0.06;
  const scale = Math.min(W, H) / 900;
  const bw = 80 * scale;
  const bh = 105 * scale;

  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(tilt);

  // Glow behind balloon
  const glow = ctx.createRadialGradient(0, 0, bh * 0.3, 0, 0, bh * 1.5);
  glow.addColorStop(0, 'rgba(255,200,100,0.08)');
  glow.addColorStop(1, 'rgba(255,200,100,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, bh * 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Envelope shape using bezier curves
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0, -bh);
  ctx.bezierCurveTo(bw * 1.1, -bh * 0.8, bw * 1.2, bh * 0.1, bw * 0.35, bh * 0.45);
  ctx.lineTo(-bw * 0.35, bh * 0.45);
  ctx.bezierCurveTo(-bw * 1.2, bh * 0.1, -bw * 1.1, -bh * 0.8, 0, -bh);
  ctx.closePath();
  ctx.clip();

  // Draw stripes
  const stripeW = (bw * 2.4) / stripeColors.length;
  for (let i = 0; i < stripeColors.length; i++) {
    ctx.fillStyle = stripeColors[i];
    ctx.fillRect(-bw * 1.2 + i * stripeW, -bh * 1.1, stripeW, bh * 1.7);
  }

  // Highlight on balloon
  const hl = ctx.createRadialGradient(-bw * 0.3, -bh * 0.3, 0, 0, 0, bh);
  hl.addColorStop(0, 'rgba(255,255,255,0.25)');
  hl.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  hl.addColorStop(1, 'rgba(0,0,0,0.15)');
  ctx.fillStyle = hl;
  ctx.fillRect(-bw * 1.3, -bh * 1.1, bw * 2.6, bh * 1.7);

  ctx.restore();

  // Envelope outline
  ctx.strokeStyle = 'rgba(60,30,20,0.3)';
  ctx.lineWidth = 1.5 * scale;
  ctx.beginPath();
  ctx.moveTo(0, -bh);
  ctx.bezierCurveTo(bw * 1.1, -bh * 0.8, bw * 1.2, bh * 0.1, bw * 0.35, bh * 0.45);
  ctx.lineTo(-bw * 0.35, bh * 0.45);
  ctx.bezierCurveTo(-bw * 1.2, bh * 0.1, -bw * 1.1, -bh * 0.8, 0, -bh);
  ctx.stroke();

  // Skirt
  ctx.fillStyle = '#5d4037';
  ctx.beginPath();
  ctx.moveTo(-bw * 0.35, bh * 0.43);
  ctx.lineTo(-bw * 0.28, bh * 0.55);
  ctx.lineTo(bw * 0.28, bh * 0.55);
  ctx.lineTo(bw * 0.35, bh * 0.43);
  ctx.closePath();
  ctx.fill();

  // Ropes
  ctx.strokeStyle = 'rgba(80,50,30,0.6)';
  ctx.lineWidth = 1 * scale;
  const basketY = bh * 0.95;
  const basketW = bw * 0.35;
  [[-bw * 0.32, bh * 0.48], [bw * 0.32, bh * 0.48], [-bw * 0.15, bh * 0.52], [bw * 0.15, bh * 0.52]].forEach(([rx, ry]) => {
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    const ex = rx > 0 ? basketW * 0.8 : -basketW * 0.8;
    ctx.quadraticCurveTo(rx * 0.5, (ry + basketY) * 0.5, ex, basketY - basketW * 0.4);
    ctx.stroke();
  });

  // Flame
  const flameIntensity = Math.pow(Math.max(0, Math.sin(t * 0.04)), 3);
  const flameH = (15 + flameIntensity * 30) * scale;
  const flameW = (6 + flameIntensity * 8) * scale;
  const flameY = bh * 0.52;

  if (flameIntensity > 0.01) {
    const fg = ctx.createRadialGradient(0, flameY - flameH * 0.3, 0, 0, flameY, flameH);
    fg.addColorStop(0, `rgba(255,255,200,${0.9 * flameIntensity})`);
    fg.addColorStop(0.3, `rgba(255,180,50,${0.7 * flameIntensity})`);
    fg.addColorStop(0.7, `rgba(255,80,0,${0.4 * flameIntensity})`);
    fg.addColorStop(1, 'rgba(255,50,0,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(0, flameY - flameH);
    ctx.quadraticCurveTo(flameW, flameY - flameH * 0.3, flameW * 0.6, flameY);
    ctx.quadraticCurveTo(0, flameY + flameH * 0.1, -flameW * 0.6, flameY);
    ctx.quadraticCurveTo(-flameW, flameY - flameH * 0.3, 0, flameY - flameH);
    ctx.fill();

    // Flame glow on skirt
    const skirtGlow = ctx.createRadialGradient(0, flameY, 0, 0, flameY, bw * 0.6);
    skirtGlow.addColorStop(0, `rgba(255,150,50,${0.15 * flameIntensity})`);
    skirtGlow.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = skirtGlow;
    ctx.beginPath();
    ctx.arc(0, flameY, bw * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Basket
  const bg = ctx.createLinearGradient(0, basketY - basketW * 0.5, 0, basketY + basketW * 0.3);
  bg.addColorStop(0, '#8d6e63');
  bg.addColorStop(0.5, '#6d4c41');
  bg.addColorStop(1, '#4e342e');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.moveTo(-basketW, basketY - basketW * 0.4);
  ctx.lineTo(-basketW * 0.9, basketY + basketW * 0.25);
  ctx.lineTo(basketW * 0.9, basketY + basketW * 0.25);
  ctx.lineTo(basketW, basketY - basketW * 0.4);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(60,30,15,0.5)';
  ctx.lineWidth = 1 * scale;
  ctx.stroke();

  // Basket weave lines
  ctx.strokeStyle = 'rgba(100,70,40,0.4)';
  ctx.lineWidth = 0.7 * scale;
  for (let i = 1; i < 4; i++) {
    const ly = basketY - basketW * 0.4 + i * (basketW * 0.65 / 4);
    ctx.beginPath();
    ctx.moveTo(-basketW + i * 1.5, ly);
    ctx.lineTo(basketW - i * 1.5, ly);
    ctx.stroke();
  }

  // Basket rim
  ctx.fillStyle = '#5d4037';
  ctx.fillRect(-basketW - 1, basketY - basketW * 0.45, basketW * 2 + 2, basketW * 0.1);

  ctx.restore();
}

// Particles (subtle floating motes)
const particles = Array.from({length: 25}, () => ({
  x: Math.random() * W, y: Math.random() * H * 0.8,
  s: Math.random() * 2 + 0.5, speed: 0.1 + Math.random() * 0.2,
  phase: Math.random() * Math.PI * 2, opacity: Math.random() * 0.15 + 0.05
}));

function drawParticles() {
  particles.forEach(p => {
    p.x += p.speed;
    p.y += Math.sin(t * 0.01 + p.phase) * 0.2;
    if (p.x > W + 10) { p.x = -10; p.y = Math.random() * H * 0.8; }
    ctx.fillStyle = `rgba(255,230,200,${p.opacity})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
    ctx.fill();
  });
}

function frame() {
  t++;
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawStars();
  drawSun();
  drawClouds();
  drawBirds();
  drawMountains();
  drawParticles();
  drawBalloon();
  drawTrees();
  requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>
