<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Air Balloon</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0a2e; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Sky gradient ---
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a0a2e');
  g.addColorStop(0.15, '#4a1942');
  g.addColorStop(0.3, '#c84b31');
  g.addColorStop(0.45, '#ec994b');
  g.addColorStop(0.6, '#f4c95d');
  g.addColorStop(0.75, '#f9e090');
  g.addColorStop(1, '#fdf6e3');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// --- Sun ---
function drawSun() {
  const sx = W * 0.75, sy = H * 0.42;
  const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, H * 0.35);
  g.addColorStop(0, 'rgba(255,220,100,0.9)');
  g.addColorStop(0.15, 'rgba(255,180,60,0.5)');
  g.addColorStop(0.5, 'rgba(255,120,50,0.15)');
  g.addColorStop(1, 'rgba(255,80,30,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // sun disc
  ctx.beginPath();
  ctx.arc(sx, sy, H * 0.06, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,230,140,0.95)';
  ctx.fill();
}

// --- Stars (visible in upper sky) ---
const stars = Array.from({length: 80}, () => ({
  x: Math.random(), y: Math.random() * 0.3, r: Math.random() * 1.5 + 0.5, phase: Math.random() * Math.PI * 2
}));

function drawStars() {
  stars.forEach(s => {
    const a = 0.3 + 0.3 * Math.sin(t * 0.001 + s.phase);
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,240,${a})`;
    ctx.fill();
  });
}

// --- Clouds ---
const clouds = Array.from({length: 12}, () => ({
  x: Math.random() * W * 1.5 - W * 0.25,
  y: Math.random() * H * 0.4 + H * 0.05,
  w: Math.random() * 200 + 100,
  speed: Math.random() * 0.3 + 0.1,
  opacity: Math.random() * 0.3 + 0.15
}));

function drawClouds() {
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > W + c.w) c.x = -c.w * 2;
    ctx.save();
    ctx.globalAlpha = c.opacity;
    ctx.fillStyle = '#fff';
    const cw = c.w, ch = cw * 0.35;
    // fluffy cloud shape
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, cw * 0.5, ch * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x - cw * 0.25, c.y + ch * 0.1, cw * 0.3, ch * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + cw * 0.25, c.y + ch * 0.05, cw * 0.35, ch * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// --- Mountains ---
function drawMountains(baseY, height, color, jag, offset) {
  ctx.beginPath();
  ctx.moveTo(0, H);
  const step = 8;
  for (let x = 0; x <= W + step; x += step) {
    const nx = (x + offset) * jag;
    const y = baseY - height * (
      0.5 * Math.sin(nx * 0.003) +
      0.3 * Math.sin(nx * 0.007 + 1.3) +
      0.2 * Math.sin(nx * 0.013 + 2.7)
    ) - height * 0.3;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawAllMountains() {
  // far mountains (lighter)
  drawMountains(H * 0.65, H * 0.22, 'rgba(120,80,130,0.5)', 1.2, t * 0.02);
  drawMountains(H * 0.68, H * 0.2, 'rgba(90,60,110,0.6)', 0.9, t * 0.04);
  // mid mountains
  drawMountains(H * 0.72, H * 0.22, 'rgba(60,40,80,0.75)', 0.7, t * 0.08);
  drawMountains(H * 0.76, H * 0.2, 'rgba(40,30,60,0.85)', 1.5, t * 0.12);
  // near mountains (darker)
  drawMountains(H * 0.82, H * 0.18, 'rgba(25,18,45,0.9)', 1.1, t * 0.2);
  // ground
  ctx.fillStyle = 'rgba(15,10,30,0.95)';
  ctx.fillRect(0, H * 0.88, W, H * 0.12);
  // ground gradient
  const gg = ctx.createLinearGradient(0, H * 0.85, 0, H * 0.92);
  gg.addColorStop(0, 'rgba(25,18,45,0.8)');
  gg.addColorStop(1, 'rgba(15,10,30,0.95)');
  ctx.fillStyle = gg;
  ctx.fillRect(0, H * 0.85, W, H * 0.07);
}

// --- Birds ---
const birds = Array.from({length: 8}, () => ({
  x: Math.random() * W,
  y: Math.random() * H * 0.35 + H * 0.1,
  speed: Math.random() * 0.8 + 0.3,
  wingPhase: Math.random() * Math.PI * 2,
  size: Math.random() * 3 + 2
}));

function drawBirds() {
  ctx.strokeStyle = 'rgba(30,20,40,0.6)';
  ctx.lineWidth = 1.5;
  birds.forEach(b => {
    b.x += b.speed;
    if (b.x > W + 50) { b.x = -50; b.y = Math.random() * H * 0.35 + H * 0.1; }
    const wing = Math.sin(t * 0.005 + b.wingPhase) * b.size * 1.5;
    ctx.beginPath();
    ctx.moveTo(b.x - b.size * 2, b.y + wing);
    ctx.quadraticCurveTo(b.x - b.size * 0.5, b.y - Math.abs(wing) * 0.3, b.x, b.y);
    ctx.quadraticCurveTo(b.x + b.size * 0.5, b.y - Math.abs(wing) * 0.3, b.x + b.size * 2, b.y + wing);
    ctx.stroke();
  });
}

// --- Balloon ---
let balloonX, balloonBaseY, flameIntensity = 0, flameCooldown = 0;

function initBalloon() {
  balloonX = W * 0.3;
  balloonBaseY = H * 0.32;
}
initBalloon();

function drawBalloon() {
  const sway = Math.sin(t * 0.0008) * W * 0.08;
  const bob = Math.sin(t * 0.0015) * H * 0.02 + Math.sin(t * 0.003) * H * 0.008;
  const drift = Math.sin(t * 0.0003) * W * 0.05;
  const bx = balloonX + sway + drift;
  const by = balloonBaseY + bob;

  const bw = Math.min(W, H) * 0.09; // balloon width
  const bh = bw * 1.35; // balloon height
  const basketW = bw * 0.4;
  const basketH = bw * 0.22;
  const ropeLen = bw * 0.6;

  // --- Ropes ---
  ctx.strokeStyle = 'rgba(80,50,30,0.8)';
  ctx.lineWidth = 1.5;
  const ropeTopY = by + bh * 0.45;
  const basketTopY = by + bh * 0.45 + ropeLen;
  // four ropes
  [-0.35, -0.12, 0.12, 0.35].forEach(off => {
    ctx.beginPath();
    ctx.moveTo(bx + bw * off, ropeTopY);
    ctx.lineTo(bx + basketW * off * 0.8, basketTopY);
    ctx.stroke();
  });

  // --- Basket ---
  const bkY = basketTopY;
  ctx.fillStyle = '#5c3a1e';
  ctx.strokeStyle = '#3a2210';
  ctx.lineWidth = 2;
  // basket body
  roundRect(bx - basketW / 2, bkY, basketW, basketH, 4);
  ctx.fill();
  ctx.stroke();
  // basket weave pattern
  ctx.strokeStyle = 'rgba(90,60,30,0.5)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    const ly = bkY + (basketH / 4) * (i + 0.5);
    ctx.beginPath();
    ctx.moveTo(bx - basketW / 2 + 3, ly);
    ctx.lineTo(bx + basketW / 2 - 3, ly);
    ctx.stroke();
  }

  // --- Flame ---
  flameCooldown--;
  if (flameCooldown <= 0) {
    flameIntensity = 1;
    flameCooldown = Math.random() * 180 + 90; // 1.5-4.5 sec at 60fps
  }
  if (flameIntensity > 0) {
    flameIntensity *= 0.97;
    const flameH = bw * 0.3 * flameIntensity;
    const flameW = bw * 0.08;
    const flameY = ropeTopY - flameH * 0.3;
    const fg = ctx.createRadialGradient(bx, flameY, 0, bx, flameY, flameH);
    fg.addColorStop(0, `rgba(255,255,200,${0.9 * flameIntensity})`);
    fg.addColorStop(0.3, `rgba(255,180,50,${0.7 * flameIntensity})`);
    fg.addColorStop(0.7, `rgba(255,80,10,${0.4 * flameIntensity})`);
    fg.addColorStop(1, `rgba(255,40,0,0)`);
    ctx.beginPath();
    ctx.moveTo(bx - flameW, ropeTopY);
    ctx.quadraticCurveTo(bx - flameW * 0.5, flameY - flameH * 0.5, bx, flameY - flameH);
    ctx.quadraticCurveTo(bx + flameW * 0.5, flameY - flameH * 0.5, bx + flameW, ropeTopY);
    ctx.fillStyle = fg;
    ctx.fill();

    // glow on balloon
    const glowG = ctx.createRadialGradient(bx, by + bh * 0.35, 0, bx, by + bh * 0.35, bw * 0.5);
    glowG.addColorStop(0, `rgba(255,200,80,${0.15 * flameIntensity})`);
    glowG.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = glowG;
    ctx.fillRect(bx - bw, by - bh * 0.1, bw * 2, bh * 0.8);
  }

  // --- Balloon envelope ---
  ctx.save();
  ctx.translate(bx, by);

  // balloon shape path (used for clipping)
  function balloonPath() {
    ctx.beginPath();
    ctx.moveTo(0, -bh * 0.48);
    ctx.bezierCurveTo(bw * 0.65, -bh * 0.48, bw * 0.58, bh * 0.15, bw * 0.18, bh * 0.45);
    ctx.lineTo(-bw * 0.18, bh * 0.45);
    ctx.bezierCurveTo(-bw * 0.58, bh * 0.15, -bw * 0.65, -bh * 0.48, 0, -bh * 0.48);
    ctx.closePath();
  }

  // draw base balloon
  balloonPath();
  const bg = ctx.createLinearGradient(0, -bh * 0.5, 0, bh * 0.5);
  bg.addColorStop(0, '#e63946');
  bg.addColorStop(1, '#d62839');
  ctx.fillStyle = bg;
  ctx.fill();

  // stripes with clipping
  ctx.save();
  balloonPath();
  ctx.clip();

  const stripeColors = [
    '#e63946', '#f4a261', '#e9c46a', '#2a9d8f', '#264653',
    '#e76f51', '#f4a261', '#e63946', '#2a9d8f', '#264653'
  ];
  const numStripes = stripeColors.length;
  const stripeW = (bw * 1.4) / numStripes;
  for (let i = 0; i < numStripes; i++) {
    ctx.fillStyle = stripeColors[i];
    ctx.fillRect(-bw * 0.7 + i * stripeW, -bh * 0.55, stripeW, bh * 1.1);
  }

  // horizontal bands
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(-bw, -bh * 0.5 + i * bh * 0.22, bw * 2, bh * 0.04);
  }

  // shading/highlight
  const shade = ctx.createLinearGradient(-bw * 0.5, 0, bw * 0.5, 0);
  shade.addColorStop(0, 'rgba(0,0,0,0.2)');
  shade.addColorStop(0.35, 'rgba(0,0,0,0)');
  shade.addColorStop(0.5, 'rgba(255,255,255,0.1)');
  shade.addColorStop(0.65, 'rgba(0,0,0,0)');
  shade.addColorStop(1, 'rgba(0,0,0,0.15)');
  ctx.fillStyle = shade;
  ctx.fillRect(-bw, -bh * 0.55, bw * 2, bh * 1.1);

  ctx.restore(); // end clip

  // balloon outline
  balloonPath();
  ctx.strokeStyle = 'rgba(40,20,10,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // skirt at bottom
  ctx.beginPath();
  ctx.moveTo(-bw * 0.18, bh * 0.45);
  ctx.lineTo(-bw * 0.15, bh * 0.52);
  ctx.lineTo(bw * 0.15, bh * 0.52);
  ctx.lineTo(bw * 0.18, bh * 0.45);
  ctx.fillStyle = '#d4a574';
  ctx.fill();
  ctx.strokeStyle = 'rgba(40,20,10,0.3)';
  ctx.stroke();

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// --- Particles (floating motes) ---
const motes = Array.from({length: 30}, () => ({
  x: Math.random() * W,
  y: Math.random() * H * 0.7,
  r: Math.random() * 2 + 0.5,
  speed: Math.random() * 0.2 + 0.05,
  drift: Math.random() * Math.PI * 2,
  opacity: Math.random() * 0.3 + 0.1
}));

function drawMotes() {
  motes.forEach(m => {
    m.x += m.speed;
    m.y += Math.sin(t * 0.002 + m.drift) * 0.15;
    if (m.x > W + 10) m.x = -10;
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,200,${m.opacity})`;
    ctx.fill();
  });
}

// --- Animation loop ---
function frame() {
  t++;
  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawSun();
  drawStars();
  drawClouds();
  drawBirds();
  drawAllMountains();
  drawMotes();
  drawBalloon();

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
